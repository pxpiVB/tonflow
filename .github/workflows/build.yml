name: Build TonFlow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build TonFlow contract
        run: npx blueprint build TonFlow

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tonflow-build
          path: build/
